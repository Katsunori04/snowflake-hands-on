# dbt の接続設定ファイルのサンプルです。
#
# 【使い方】
# このファイルをコピーして ~/.dbt/profiles.yml として保存してください。
# （dbt は ~/.dbt/profiles.yml を自動的に読み込みます）
#
#   cp dbt/profiles.example.yml ~/.dbt/profiles.yml
#
# コピー後、<...> の部分を実際の値に書き換えてください。
# パスワードは直書きではなく環境変数の利用を推奨します:
#   password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"

snowflake_learn:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "<your_account_locator>"
      user: "<your_username>"
      password: "<your_password>"
      role: "<your_role>"
      database: LEARN_DB
      warehouse: LEARN_WH
      schema: MART
      threads: 4
      client_session_keep_alive: false
